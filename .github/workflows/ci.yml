name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  contracts:
    name: Contracts (Foundry)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts
    steps:
      - name: Checkout (with submodules)
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foundry
        uses: foundry-rs/foundry-toolchain@v1
        with:
          version: stable

      - name: Forge version
        run: forge --version

      - name: Format check
        run: forge fmt --check src test script

      - name: Build (with sizes)
        run: forge build --sizes

      - name: Test
        run: forge test -vvv

  backend:
    name: Backend (API)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @tinft/api typecheck

      - name: Test
        run: pnpm --filter @tinft/api test
