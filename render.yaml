# Render Blueprint — pubblica l'API TINFT (con i frontend e la test-app) online.
# Uso: su https://dashboard.render.com → New → Blueprint → collega il repo GitHub.
# Render legge questo file, builda il Dockerfile e crea il servizio web.
# I valori "sync: false" vanno inseriti a mano nella dashboard (sono segreti).
services:
  - type: web
    name: tinft-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: true
    healthCheckPath: /ready
    envVars:
      # --- pubblici (deploy Base Sepolia con burn all'ingresso) ---
      # Contratto TinftTicket rideployato con burn (markUsed → _burn sui normali,
      # Signature esenti). Sostituisce lo storico 0x8704…1F37 (senza burn).
      - key: TICKET_ADDRESS
        value: "0x0ecaf2e665256bbc86f8c7c992cbd3d44843db5d"
      - key: CHAIN_ID
        value: "84532"
      - key: SEED_DEMO
        value: "1"
      # --- generato da Render ---
      - key: AUTH_SECRET
        generateValue: true
      # --- SEGRETI: inseriscili nella dashboard (non finiscono nel repo) ---
      - key: CHAIN_RPC_URL
        sync: false # = il tuo Alchemy Base Sepolia
      - key: CHAIN_PRIVATE_KEY
        sync: false # = chiave OWNER del contratto (deployer)
      # --- Email reale (registrazione OTP via Resend) ---
      - key: RESEND_API_KEY
        sync: false # re_... (da resend.com → API Keys)
      - key: EMAIL_FROM
        value: "onboarding@resend.dev"
      # --- Pagamenti Stripe (TEST mode, opzionale) ---
      - key: STRIPE_SECRET_KEY
        sync: false # sk_test_... (Stripe → Developers → API keys, modalità Test)
      - key: STRIPE_WEBHOOK_SECRET
        sync: false # whsec_... (Stripe → Webhooks → endpoint https://<host>/webhooks/psp)
