[profile.default]
src = "src"
test = "test"
script = "script"
out = "out"
libs = ["lib"]
solc = "0.8.28"
optimizer = true
optimizer_runs = 200
evm_version = "cancun"
remappings = [
    "@openzeppelin/contracts/=lib/openzeppelin-contracts/contracts/",
    "forge-std/=lib/forge-std/src/",
]

[fmt]
line_length = 120
tab_width = 4
bracket_spacing = false
int_types = "long"

# Reti L2 — Base (gli URL arrivano da .env / variabili d'ambiente)
[rpc_endpoints]
base_sepolia = "${BASE_SEPOLIA_RPC_URL}"
base = "${BASE_MAINNET_RPC_URL}"

# Verifica del codice su Basescan (forge script ... --verify). La chiave arriva da
# BASESCAN_API_KEY; gli chain id sono 84532 (Base Sepolia) e 8453 (Base mainnet).
[etherscan]
base_sepolia = {key = "${BASESCAN_API_KEY}", chain = 84532, url = "https://api-sepolia.basescan.org/api"}
base = {key = "${BASESCAN_API_KEY}", chain = 8453, url = "https://api.basescan.org/api"}
